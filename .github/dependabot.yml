version: 2
updates:
  # Keep the SHA-pinned GitHub Actions in workflows up to date.
  # Dependabot updates the pinned commit SHA and the trailing version
  # comment together, via reviewable PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
